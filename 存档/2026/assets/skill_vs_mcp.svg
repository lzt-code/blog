<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
        </marker>
        <style>
            .box-title { font-family: sans-serif; font-size: 20px; font-weight: bold; fill: #fff; text-anchor: middle; }
            .box-text { font-family: sans-serif; font-size: 15px; fill: #fff; text-anchor: middle; }
            .connector-text { font-family: sans-serif; font-size: 14px; fill: #333; text-anchor: middle; font-weight: 500; }
        </style>
    </defs>
    
    <!-- Background -->
    <rect width="100%" height="100%" fill="#f8f9fa" />
    
    <!-- Agent (Center) -->
    <g transform="translate(500.0, 140)">
        <rect width="200" height="120" rx="12" ry="12" fill="#4a90e2" stroke="#333" stroke-width="2" />
        <text x="100" y="50" class="box-title">Agent</text>
        <text x="100" y="85" class="box-text">Planner &amp; Executor</text>
    </g>

    <!-- Skill (Left) -->
    <g transform="translate(80, 130)">
        <rect width="220" height="140" rx="12" ry="12" fill="#e67e22" stroke="#333" stroke-width="2" />
        <text x="110" y="40" class="box-title">Skill</text>
        <text x="110" y="70" class="box-text">Technical Manual</text>
        <text x="110" y="90" class="box-text">(技术手册)</text>
        <text x="110" y="115" class="box-text">"How to do it"</text>
    </g>

    <!-- MCP (Right) -->
    <g transform="translate(900, 130)">
        <rect width="220" height="140" rx="12" ry="12" fill="#2ecc71" stroke="#333" stroke-width="2" />
        <text x="110" y="40" class="box-title">MCP</text>
        <text x="110" y="70" class="box-text">Standard Protocol</text>
        <text x="110" y="90" class="box-text">(标准协议)</text>
        <text x="110" y="115" class="box-text">"Call External Tool"</text>
    </g>

    <!-- Arrows with even more spacing for text -->
    <!-- Skill to Agent -->
    <line x1="300" y1="200" x2="490.0" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="395.0" y="190" class="connector-text">Provides Knowledge</text>

    <!-- Agent to MCP -->
    <line x1="700.0" y1="200" x2="890" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="795.0" y="190" class="connector-text">Invokes Tools</text>

    </svg>