  <text x="108" y="220" font-family="Arial, sans-serif" font-size="11" fill="#9aa0a6">2025年4月</text>
  <text x="762" y="220" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#9aa0a6">2026年2月</text>
  
  <!-- 版本节点 -->
  
  <!-- Flutter 3.29 -->
  <circle cx="180" cy="200" r="8" fill="#9aa0a6" filter="url(#shadow)"/>
