  <rect x="140" y="270" width="80" height="30" rx="5" fill="#9aa0a6" opacity="0.9"/>
  <text x="180" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Flutter 3.29</text>
  <text x="180" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">2025年4月</text>
  <text x="180" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9aa0a6" font-weight="bold">历史版本</text>
  
