  <text x="365" y="375" font-family="Arial, sans-serif" font-size="11" fill="#333">观察/风险</text>
  
  <circle cx="450" cy="370" r="6" fill="#9aa0a6"/>
  <text x="465" y="375" font-family="Arial, sans-serif" font-size="11" fill="#333">历史版本</text>
  
  <text x="600" y="375" font-family="Arial, sans-serif" font-size="11" fill="#666">建议：生产环境首选 3.38，尝鲜 3.41</text>
