  <text x="740" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ea4335" font-weight="bold">⚠️ 观察期</text>
  <text x="740" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ea4335">激进尝鲜</text>
  
  <rect x="50" y="350" width="700" height="40" fill="white" stroke="#e0e0e0" rx="5"/>
  <text x="60" y="365" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">风险等级：</text>
  
