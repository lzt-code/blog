  <text x="600" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34a853" font-weight="bold">✓ 生产首选</text>
  <text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34a853">黄金稳定版</text>

  <!-- Flutter 3.41 -->
  <circle cx="740" cy="200" r="8" fill="#ea4335" filter="url(#shadow)"/>
  <line x1="740" y1="200" x2="740" y2="270" stroke="#ea4335" stroke-width="2"/>
  <rect x="700" y="270" width="80" height="30" rx="5" fill="#ea4335" opacity="0.9"/>
